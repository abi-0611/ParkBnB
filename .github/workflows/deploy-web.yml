name: Deploy Web (Vercel)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Vercel environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is not set. In GitHub: Settings → Secrets and variables → Actions → New repository secret. Create a token at https://vercel.com/account/tokens"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::VERCEL_ORG_ID and VERCEL_PROJECT_ID must be set (from apps/web/.vercel/project.json after vercel link, or Vercel project settings)."
            exit 1
          fi

      - name: Pull Vercel environment info
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target }}" = "production" ]; then
            pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target }}" = "preview" ]; then
            pnpm dlx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          else
            pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          fi

      - name: Build Vercel artifacts
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: pnpm dlx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifacts
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target }}" = "preview" ]; then
            pnpm dlx vercel deploy --prebuilt --token="$VERCEL_TOKEN"
          else
            pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          fi
